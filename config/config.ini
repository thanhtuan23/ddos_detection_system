# src/ddos_detection_system/config/config.ini
[Network]
# Giao diện mạng để bắt gói tin
interface = eth0
# Bộ lọc bắt gói tin (Để trống nếu không sử dụng)
capture_filter = 

[Detection]
# Đường dẫn đến tệp tin mô hình
model_path = ml/models/random_forest_ddos_model.pkl
# Ngưỡng xác suất để phát hiện tấn công DDoS
detection_threshold = 0.7
# Kích thước batch để xử lý luồng mạng
batch_size = 5
# Khoảng thời gian giữa các lần kiểm tra (giây)
check_interval = 0.5
# Tỷ lệ gói tin tối thiểu cho các loại tấn công
udp_flood_min_rate = 1000
syn_flood_min_rate = 100
# Bật chế độ bỏ qua dịch vụ streaming
ignore_streaming = true

[Prevention]
# Thời gian chặn IP (giây)
block_duration = 300
# Danh sách IP không bị chặn (phân tách bằng dấu phẩy)
whitelist = 127.0.0.1, 192.168.1.1, 192.168.140.132, 142.250.0.0/16, 172.217.0.0/16, 74.125.0.0/16, 216.58.0.0/16

[Notification]
# Máy chủ SMTP
smtp_server = smtp.gmail.com
# Cổng SMTP
smtp_port = 465
# Email người gửi
sender_email = your-email@gmail.com
# Mật khẩu email
password = your-app-password
# Người nhận (phân tách bằng dấu phẩy)
recipients = admin@example.com, security@example.com
# Thời gian chờ giữa các thông báo (giây)
cooldown_period = 300

[WebUI]
# Host cho webUI
host = 0.0.0.0
# Port cho webUI
port = 5000
# Chế độ debug
debug = true

[TrustedServices]
# Dịch vụ đáng tin cậy (không gây cảnh báo)
streaming_services = youtube.com, netflix.com, spotify.com, vimeo.com, twitch.tv
video_hosting = googlevideo.com, akamaihd.net, cloudfront.net
cdn_networks = fastly.net, cloudflare.net, akamai.com